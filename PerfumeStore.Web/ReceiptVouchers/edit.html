<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Receipt Voucher - Memento Perfume</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/theme-dark.css" />
  <link rel="stylesheet" href="receiptvouchers.css" />
</head>

<body>
  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">Memento Perfume</div>
      <nav class="navbar-links">
        <a href="../Dashboard/">Dashboard</a>
        <a href="../Debts/">Debts</a>
        <a href="../SalesInvoices/">Sales Invoices</a>
        <a href="../PurchaseInvoices/">Purchase Invoices</a>
        <a href="../Expenses/">Expenses</a>
        <a href="../PaymentVouchers/">Payment Vouchers</a>
        <a href="../ReceiptVouchers/" class="active">Receipt Vouchers</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <div class="page-header">
        <div>
          <h1 class="page-title">Edit Receipt Voucher</h1>
          <p class="page-subtitle">Fill the information below.</p>
        </div>
        <a href="index.html" class="btn-secondary">← Back</a>
      </div>

      <div class="form-card">
        <form id="form" action="#" method="post">
          <div class="form-group">
            <label for="Date">Date <span class="req">*</span></label>
            <input id="Date" type="date" placeholder="Date" required />
          </div>
          <div class="form-group">
            <label for="CustomerPhone">Custome\1 \2hone <span class="req">*</span></label>
            <select id="CustomerPhone" class="search-input"></select>
          </div>
          <div class="form-group">
            <label for="SalesInvoiceID">Sale\1 \2nvoic\1 \2D</label>
            <input id="SalesInvoiceID" type="text" placeholder="Sale\1 \2nvoic\1 \2D" />
          </div>
          <div class="form-group">
            <label for="MoneyAccountID">Mone\1 \2ccoun\1 \2D <span class="req">*</span></label>
            <select id="MoneyAccountID" class="search-input"></select>
          </div>
          <div class="form-group">
            <label for="Amount">Amount <span class="req">*</span></label>
            <input id="Amount" type="number" placeholder="Amount" required />
          </div>
          <div class="form-group">
            <label for="Notes">Notes</label>
            <textarea id="Notes" rows="4" placeholder="Notes..."></textarea>
          </div>

          <div class="form-actions"
            style="margin-top:14px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <button id="btnSave" type="button" class="btn-primary">Save</button>
            <a href="index.html" class="btn-light">Cancel</a>
            <div id="pageMsg" class="hint"></div>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="../assets/common.js"></script>
  <script src="common.js"></script>
  <script src="edit.js"></script>
  <script>initEdit();</script>
</body>

</html>
