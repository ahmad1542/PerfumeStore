<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Receipt Vouchers - Memento Perfume</title>
  <link rel="stylesheet" href="../assets/theme-dark.css" />
  <link rel="stylesheet" href="receiptvouchers.css" />
</head>
<body>
  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">Memento Perfume</div>
      <nav class="navbar-links">
        <a href="../Dashboard/">Dashboard</a>
        <a href="../Debts/">Debts</a>
        <a href="../SalesInvoices/">Sales Invoices</a>
        <a href="../PurchaseInvoices/">Purchase Invoices</a>
        <a href="../Expenses/">Expenses</a>
        <a href="../PaymentVouchers/">Payment Vouchers</a>
        <a href="../ReceiptVouchers/" class="active">Receipt Vouchers</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <div class="page-header">
        <div>
          <h1 class="page-title">Receipt Vouchers <span id="countChip" class="count-chip">0</span></h1>
          <p class="page-subtitle">Track customer collections and person debt repayments in one place.</p>
        </div>
        <div class="list-tools">
          <input id="searchInput" class="search-input" type="text" placeholder="Search by customer, amount, notes, invoice id..." />
          <a href="create.html" class="btn-primary">+ New Receipt Voucher</a>
        </div>
      </div>

      <div id="emptyState" class="empty-state">
        <div class="empty-icon">💰</div>
        <h2>No receipt vouchers yet</h2>
        <p>Create your first receipt voucher.</p>
        <a href="create.html" class="btn-primary">Create</a>
      </div>

      <div id="pageMsg" class="hint"></div>

      <div id="tableCard" class="table-wrapper table-card">
        <table class="receiptvouchers-table">
          <thead id="tableHead"></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="../assets/common.js"></script>
  <script src="common.js"></script>
  <script src="receiptvouchers.js"></script>
  <script>loadList();</script>
</body>
</html>
