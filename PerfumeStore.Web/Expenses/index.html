<!doctype html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Expenses - Memento Perfume</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/theme-dark.css" />
  <link rel="stylesheet" href="expenses.css" />
</head>

<body>
  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">Memento Perfume</div>
      <nav class="navbar-links">
        <a href="../Dashboard/">Dashboard</a>
        <a href="../Debts/">Debts</a>
        <a href="../SalesInvoices/">Sales Invoices</a>
        <a href="../PurchaseInvoices/">Purchase Invoices</a>
        <a href="../Expenses/" class="active">Expenses</a>
        <a href="../PaymentVouchers/">Payment Vouchers</a>
        <a href="../ReceiptVouchers/">Receipt Vouchers</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <div class="page-header">
        <div>
          <h1 class="page-title">
            Expenses <span id="countChip" class="count-chip">0</span>
          </h1>
          <p class="page-subtitle">Manage expenses here.</p>
        </div>

        <div class="list-tools">

          <div class="expense-type-dropdown-wrap">
            <button type="button" id="expenseTypeDropdownBtn" class="expense-type-dropdown-btn">
              <span id="expenseTypeDropdownText">All expense types</span>
              <i class="bi bi-chevron-down"></i>
            </button>

            <div id="expenseTypeDropdownMenu" class="expense-type-dropdown-menu hidden">
              <div class="expense-type-dropdown-header">
                <label class="checkbox-filter-item expense-type-all-option">
                  <input type="checkbox" id="expenseTypeAllCheckbox" checked />
                  <span>All expense types</span>
                </label>
              </div>

              <div id="expenseTypeFilters" class="expense-type-dropdown-list"></div>
            </div>
          </div>

          <input id="searchInput" class="search-input" type="text" placeholder="Search..." />
          <input id="fromDateInput" class="search-input date-filter-input" type="date" />
          <input id="toDateInput" class="search-input date-filter-input" type="date" />
          <a href="create.html" class="btn-primary">+ New Expense</a>
        </div>
      </div>

      <div id="emptyState" class="empty-state">
        <div class="empty-icon">📄</div>
        <h2>No expenses yet</h2>
        <p>Start by creating your first record.</p>
        <a href="create.html" class="btn-primary">Create</a>
      </div>

      <div id="pageMsg" class="hint"></div>

      <div id="tableCard" class="table-wrapper table-card">
        <table class="expenses-table">
          <thead id="tableHead"></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="../assets/api-config.js"></script>
  <script src="../assets/endpoints.js"></script>
  <script src="../assets/common.js"></script>
  <script src="common.js"></script>
  <script src="expenses.js"></script>
</body>

</html>
